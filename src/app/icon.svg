<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Chat bubble -->
  <rect x="8" y="10" width="32" height="24" rx="8" fill="white" fill-opacity="0.2"/>
  <!-- Central node -->
  <circle cx="24" cy="20" r="3" fill="white"/>
  <!-- Satellite nodes -->
  <circle cx="16" cy="16" r="2" fill="white" fill-opacity="0.8"/>
  <circle cx="32" cy="16" r="2" fill="white" fill-opacity="0.8"/>
  <circle cx="18" cy="26" r="2" fill="white" fill-opacity="0.8"/>
  <circle cx="30" cy="26" r="2" fill="white" fill-opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="18" y1="16" x2="22" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="30" y1="16" x2="26" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="19.5" y1="25" x2="22" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="28.5" y1="25" x2="26" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Chat tail -->
  <path d="M14 34 L10 40 L20 34" fill="url(#bg)"/>
  <path d="M14 34 L10 40 L20 34" fill="white" fill-opacity="0.2"/>
</svg>
